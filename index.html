<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelOS V2 - True Pixel Art Software</title>
    <style>
        /* Paleta de colores clásica de 16-bits (Estilo Amiga/DOS) */
        :root {
            --bg-dark: #0f1015;
            --bg-window: #222533;
            --bg-inner: #181a24;
            --pixel-border: #444961;
            --pixel-high: #ffffff;
            --pixel-shadow: #11121a;
            
            --pixel-blue: #3264c8;
            --pixel-blue-light: #6496ff;
            --pixel-green: #329664;
            --pixel-green-light: #64c896;
            --pixel-orange: #d86420;
            
            --text: #e0e4f0;
            --text-dark: #11121a;
            
            /* Multiplicador de escala del píxel */
            --p: 4px; 
        }

        /* Forzar el renderizado por componentes de píxeles crujientes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'MS Gothic', 'Courier New', monospace; /* Fuentes con kerning fijo y pixelado */
            font-size: 14px;
            font-weight: bold;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -webkit-font-smoothing: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(var(--p) * 2);
        }

        /* --- BORDES INTEGRALES PIXEL ART (Estilo Biselado 3D Retro) --- */
        .px-box-out {
            background-color: var(--bg-window);
            box-shadow: 
                inset var(--p) var(--p) 0 var(--pixel-high),
                inset calc(var(--p) * -1) calc(var(--p) * -1) 0 var(--pixel-shadow),
                0 0 0 var(--p) var(--pixel-border);
            padding: calc(var(--p) * 3);
        }

        .px-box-in {
            background-color: var(--bg-inner);
            box-shadow: 
                inset var(--p) var(--p) 0 var(--pixel-shadow),
                inset calc(var(--p) * -1) calc(var(--p) * -1) 0 var(--pixel-border),
                0 0 0 var(--p) var(--pixel-shadow);
            padding: calc(var(--p) * 2);
        }

        /* --- INTERFAZ DEL SOFTWARE --- */
        #desktop {
            display: flex;
            width: 100%;
            height: 100%;
            gap: calc(var(--p) * 4);
        }

        /* Barra de herramientas / Sidebar */
        .sidebar {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: calc(var(--p) * 3);
        }

        .brand-title {
            text-align: center;
            color: var(--pixel-orange);
            font-size: 16px;
            text-shadow: var(--p) var(--p) 0 var(--pixel-shadow);
            margin-bottom: var(--p);
            letter-spacing: 2px;
        }

        /* Botones Pixel-Art Reales */
        .px-btn {
            background-color: var(--bg-window);
            color: var(--text);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: calc(var(--p) * 2);
            padding: calc(var(--p) * 2);
            width: 100%;
            position: relative;
            box-shadow: 
                inset var(--p) var(--p) 0 var(--pixel-high),
                inset calc(var(--p) * -1) calc(var(--p) * -1) 0 var(--pixel-shadow),
                0 0 0 var(--p) var(--pixel-border);
        }

        .px-btn:hover {
            background-color: #2a2e40;
        }

        /* Efecto presionado físicamente en los píxeles */
        .px-btn:active, .px-btn.active {
            box-shadow: 
                inset var(--p) var(--p) 0 var(--pixel-shadow),
                inset calc(var(--p) * -1) calc(var(--p) * -1) 0 var(--pixel-high),
                0 0 0 var(--p) var(--pixel-border);
            padding-top: calc(var(--p) * 2.5);
            padding-left: calc(var(--p) * 2.5);
            background-color: var(--pixel-blue);
            color: white;
        }

        /* Contenedor del Software de Trabajo */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: calc(var(--p) * 3);
        }

        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--p) solid var(--pixel-border);
            padding-bottom: calc(var(--p) * 2);
        }

        .window-title {
            font-size: 16px;
            text-transform: uppercase;
        }

        .view-content {
            flex: 1;
            overflow-y: auto;
        }

        /* --- TABLAS Y DATOS PIXELADOS --- */
        .pixel-grid {
            width: 100%;
            border-collapse: collapse;
        }

        .pixel-grid th {
            background-color: var(--pixel-shadow);
            color: var(--pixel-orange);
            padding: calc(var(--p) * 2);
            text-align: left;
            border: var(--p) solid var(--pixel-border);
        }

        .pixel-grid td {
            padding: calc(var(--p) * 2);
            border: var(--p) solid var(--pixel-border);
        }

        /* Inputs y Formularios de Sistema */
        .field-group {
            display: flex;
            flex-direction: column;
            gap: var(--p);
            margin-bottom: calc(var(--p) * 3);
        }

        .pixel-input {
            width: 100%;
            background-color: var(--bg-dark);
            border: none;
            color: var(--pixel-green-light);
            padding: calc(var(--p) * 2);
            box-shadow: 
                inset var(--p) var(--p) 0 var(--pixel-shadow),
                inset calc(var(--p) * -1) calc(var(--p) * -1) 0 var(--pixel-border);
            outline: none;
        }

        .action-btn {
            background-color: var(--pixel-green);
            box-shadow: 
                inset var(--p) var(--p) 0 var(--pixel-green-light),
                inset calc(var(--p) * -1) calc(var(--p) * -1) 0 var(--pixel-shadow),
                0 0 0 var(--p) var(--pixel-border);
            color: var(--text-dark);
            width: auto;
            align-self: flex-start;
        }

        /* --- ICONOS HECHOS CON BOX-SHADOW (Grosor pixel-art real) --- */
        .px-icon {
            display: inline-block;
            width: var(--p);
            height: var(--p);
            background: transparent;
        }

        /* Icono Casa / Panel */
        .ic-panel {
            box-shadow: 
                2px 0 0 currentColor, 4px 0 0 currentColor,
                0 2px 0 currentColor, 2px 2px 0 currentColor, 4px 2px 0 currentColor, 6px 2px 0 currentColor,
                0 4px 0 currentColor, 6px 4px 0 currentColor,
                0 6px 0 currentColor, 2px 6px 0 currentColor, 4px 6px 0 currentColor, 6px 6px 0 currentColor;
            transform: scale(2);
            margin-right: var(--p);
        }

        /* Icono Disquete / Guardar u Operaciones */
        .ic-data {
            box-shadow: 
                0 0 0 currentColor, 2px 0 0 currentColor, 4px 0 0 currentColor, 6px 0 0 #ff6464,
                0 2px 0 currentColor, 4px 2px 0 currentColor, 6px 2px 0 currentColor,
                0 4px 0 currentColor, 2px 4px 0 currentColor, 4px 4px 0 currentColor, 6px 4px 0 currentColor,
                0 6px 0 currentColor, 2px 6px 0 currentColor, 4px 6px 0 currentColor, 6px 6px 0 currentColor;
            transform: scale(2);
            margin-right: var(--p);
        }

        /* Icono Llave / Configuración */
        .ic-config {
            box-shadow: 
                2px 0 0 currentColor, 4px 0 0 currentColor,
                0 2px 0 currentColor, 6px 2px 0 currentColor,
                2px 4px 0 currentColor, 4px 4px 0 currentColor,
                2px 6px 0 currentColor,
                2px 8px 0 currentColor;
            transform: scale(2);
            margin-right: var(--p);
        }
    </style>
</head>
<body>

    <div id="desktop" class="px-box-out">
        
        <!-- SIDEBAR -->
        <aside class="sidebar px-box-in">
            <div class="brand-title">PX-SYS V2</div>
            
            <button class="px-btn active" data-tab="db">
                <i class="px-icon ic-panel"></i>
                <span>PANEL</span>
            </button>
            <button class="px-btn" data-tab="ops">
                <i class="px-icon ic-data"></i>
                <span>DATA</span>
            </button>
            <button class="px-btn" data-tab="set">
                <i class="px-icon ic-config"></i>
                <span>SETUP</span>
            </button>
        </aside>

        <!-- AREA DE TRABAJO DEL SOFTWARE -->
        <main class="main-panel px-box-in">
            <header class="window-header">
                <h1 id="view-title">SYS_PANEL</h1>
                <span style="color: var(--pixel-green-light)">ONLINE</span>
            </header>

            <div id="view-viewport" class="view-content">
                <!-- Inyecciones lógicas reales aquí -->
            </div>
        </main>

    </div>

    <!-- CÓDIGO DE FUNCIONAMIENTO INTERACTIVO -->
    <script>
        const SOFTWARE_VIEWS = {
            db: {
                title: "DATOS_DEL_NODO",
                html: `
                    <p style="margin-bottom: 12px;">RENDIMIENTO DE PROCESAMIENTO CENTRAL:</p>
                    <table class="pixel-grid">
                        <thead>
                            <tr>
                                <th>SECTOR</th>
                                <th>USO</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>CORE_A</td>
                                <td>45%</td>
                                <td style="color: var(--pixel-green-light)">OK</td>
                            </tr>
                            <tr>
                                <td>CORE_B</td>
                                <td>89%</td>
                                <td style="color: var(--pixel-orange)">WARN</td>
                            </tr>
                        </tbody>
                    </table>
                `
            },
            ops: {
                title: "REGISTROS_INTERNOS",
                html: `
                    <p style="margin-bottom: 12px;">HISTORIAL SÍNCRONO DEL SOFTWARE:</p>
                    <div class="px-box-in" style="font-family: monospace; color: #a0a4b0; line-height: 1.6;">
                        > INITIALIZING CORE ENGINE... OK<br>
                        > LOADING INTERFACE GRAPHICS... OK<br>
                        > BUFFER ALLOCATION AT 0x00FF4B... OK<br>
                        > SYSTEM READY FOR USER INPUT.
                    </div>
                `
            },
            set: {
                title: "AJUSTES_DEL_NUCLEO",
                html: `
                    <div class="field-group">
                        <label>IDENTIFICADOR DEL NODO (ID):</label>
                        <input type="text" class="pixel-input" value="NODE_MASTER_01">
                    </div>
                    <div class="field-group">
                        <label>FRECUENCIA DE REFRESCO (MS):</label>
                        <input type="number" class="pixel-input" value="16">
                    </div>
                    <button class="px-btn action-btn" onclick="alert('DATOS GUARDADOS EN NÚCLEO ROM')">
                        GUARDAR_CONFIG
                    </button>
                `
            }
        };

        class SoftwareController {
            constructor() {
                this.buttons = document.querySelectorAll('.px-btn');
                this.title = document.getElementById('view-title');
                this.viewport = document.getElementById('view-viewport');
                
                this.initEvents();
                this.render('db'); // Carga inicial limpia
            }

            initEvents() {
                this.buttons.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const target = e.currentTarget.getAttribute('data-tab');
                        if(!target) return;

                        this.buttons.forEach(b => b.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        
                        this.render(target);
                    });
                });
            }

            render(key) {
                const view = SOFTWARE_VIEWS[key];
                if(view) {
                    this.title.textContent = view.title;
                    this.viewport.innerHTML = view.html;
                }
            }
        }

        // Ejecución inmediata
        document.addEventListener('DOMContentLoaded', () => {
            new SoftwareController();
        });
    </script>
</body>
</html>
