<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelOS - Dashboard Profesional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Contenedor Principal de la App -->
    <div id="app-root" class="pixel-app">
        
        <!-- Barra de Navegación Lateral -->
        <aside class="app-sidebar">
            <div class="brand">
                <i class="icon icon-logo"></i>
                <span>PixelCorp</span>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-target="dashboard">
                    <i class="icon icon-dashboard"></i>
                    <span>Panel</span>
                </button>
                <button class="nav-item" data-target="analytics">
                    <i class="icon icon-analytics"></i>
                    <span>Métricas</span>
                </button>
                <button class="nav-item" data-target="settings">
                    <i class="icon icon-settings"></i>
                    <span>Ajustes</span>
                </button>
            </nav>
        </aside>

        <!-- Contenido Principal -->
        <main class="app-content">
            <header class="content-header">
                <h1 id="page-title">Panel de Control</h1>
                <div class="user-profile">
                    <i class="icon icon-user"></i>
                    <span>Admin_User</span>
                </div>
            </header>

            <!-- Vistas Dinámicas -->
            <section id="view-container" class="view-viewport">
                <!-- El contenido se inyecta dinámicamente mediante JS -->
            </section>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
