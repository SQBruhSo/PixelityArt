<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelOS - Sistema de Gestión Profesional</title>
    <style>
        /* --- CONFIGURACIÓN DE PÍXELES Y COLORES --- */
        :root {
            --bg-dark: #121216;
            --bg-panel: #1c1c24;
            --bg-surface: #262632;
            --border-primary: #45455b;
            --text-main: #e2e2e9;
            --text-muted: #787893;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
        }

        /* Reset Profesional con Renderizado Pixelado */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -webkit-font-smoothing: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
            padding: 8px; /* Margen exterior retro */
        }

        /* --- BORDES ESTILO PIXEL ART --- */
        .pixel-border {
            border: 4px solid var(--border-primary);
            outline: 2px solid var(--bg-dark);
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        #app-root {
            display: flex;
            width: 100%;
            height: 100%;
            background-color: var(--bg-panel);
            gap: 8px;
            padding: 8px;
        }

        /* --- BARRA LATERAL (SIDEBAR) --- */
        .app-sidebar {
            width: 240px;
            background-color: var(--bg-surface);
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 18px;
            color: var(--text-main);
            padding-bottom: 16px;
            border-bottom: 4px id var(--border-primary);
            margin-bottom: 24px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Botones de Navegación */
        .nav-item {
            background-color: var(--bg-panel);
            border: 4px solid var(--border-primary);
            color: var(--text-muted);
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            text-align: left;
            width: 100%;
            transition: none; /* En pixel art las transiciones suaves rompen la estética */
        }

        .nav-item:hover {
            color: var(--text-main);
            background-color: var(--bg-surface);
            border-color: var(--text-muted);
        }

        .nav-item.active {
            color: var(--bg-dark);
            background-color: var(--accent-blue);
            border-color: #93c5fd;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .app-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-surface);
            padding: 20px;
            overflow: hidden;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 4px solid var(--border-primary);
            margin-bottom: 20px;
        }

        .content-header h1 {
            font-size: 22px;
            text-transform: uppercase;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-panel);
            padding: 8px 12px;
            border: 4px solid var(--border-primary);
        }

        /* Contenedor dinámico */
        .view-viewport {
            flex: 1;
            overflow-y: auto;
        }

        /* --- COMPONENTES INTERNOS DEL SOFTWARE --- */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .pixel-card {
            background-color: var(--bg-panel);
            border: 4px solid var(--border-primary);
            padding: 16px;
        }

        .pixel-card h3 {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .pixel-card .value {
            font-size: 28px;
            color: var(--accent-green);
        }

        /* Tablas */
        .pixel-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .pixel-table th {
            background-color: var(--bg-panel);
            color: var(--text-muted);
            text-align: left;
            padding: 12px;
            border-bottom: 4px solid var(--border-primary);
        }

        .pixel-table td {
            padding: 12px;
            border-bottom: 4px solid var(--border-primary);
            background-color: rgba(0,0,0,0.1);
        }

        /* Formularios funcionales */
        .pixel-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 400px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .pixel-input {
            background-color: var(--bg-dark);
            border: 4px solid var(--border-primary);
            color: var(--text-main);
            padding: 10px;
            outline: none;
        }

        .pixel-input:focus {
            border-color: var(--accent-blue);
        }

        .pixel-btn {
            background-color: var(--accent-green);
            border: 4px solid #6ee7b7;
            color: var(--bg-dark);
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .pixel-btn:active {
            background-color: var(--bg-dark);
            color: var(--accent-green);
            border-color: var(--border-primary);
        }

        /* --- MOTOR DE ICONOS PIXEL ART (100% CSS) --- */
        /* Cada punto en box-shadow representa 1 píxel real amplificado */
        .px-icon {
            display: inline-block;
            width: 3px;
            height: 3px;
            background: transparent;
        }

        /* Icono de Logo (Corona/M) */
        .icon-logo {
            box-shadow: 
                0px 0px 0 var(--accent-orange), 12px 0px 0 var(--accent-orange),
                0px 3px 0 var(--accent-orange), 3px 3px 0 var(--accent-orange), 9px 3px 0 var(--accent-orange), 12px 3px 0 var(--accent-orange),
                0px 6px 0 var(--accent-orange), 6px 6px 0 var(--accent-orange), 12px 6px 0 var(--accent-orange),
                0px 9px 0 var(--accent-orange), 12px 9px 0 var(--accent-orange);
            margin-right: 12px;
        }

        /* Icono de Panel (Cuadrículas) */
        .icon-panel {
            box-shadow: 
                0px 0px 0 currentColor, 3px 0px 0 currentColor, 9px 0px 0 currentColor, 12px 0px 0 currentColor,
                0px 3px 0 currentColor, 3px 3px 0 currentColor, 9px 3px 0 currentColor, 12px 3px 0 currentColor,
                0px 9px 0 currentColor, 3px 9px 0 currentColor, 9px 9px 0 currentColor, 12px 9px 0 currentColor,
                0px 12px 0 currentColor, 3px 12px 0 currentColor, 9px 12px 0 currentColor, 12px 12px 0 currentColor;
        }

        /* Icono de Métricas (Gráfico de barras) */
        .icon-metrics {
            box-shadow: 
                0px 12px 0 currentColor, 3px 9px 0 currentColor, 3px 12px 0 currentColor,
                6px 6px 0 currentColor, 6px 9px 0 currentColor, 6px 12px 0 currentColor,
                9px 3px 0 currentColor, 9px 6px 0 currentColor, 9px 9px 0 currentColor, 9px 12px 0 currentColor,
                12px 0px 0 currentColor, 12px 3px 0 currentColor, 12px 6px 0 currentColor, 12px 9px 0 currentColor, 12px 12px 0 currentColor;
        }

        /* Icono de Ajustes (Herramienta/Tuerca) */
        .icon-settings {
            box-shadow: 
                3px 0px 0 currentColor, 6px 0px 0 currentColor, 9px 0px 0 currentColor,
                0px 3px 0 currentColor, 12px 3px 0 currentColor,
                0px 6px 0 currentColor, 6px 6px 0 currentColor, 12px 6px 0 currentColor,
                0px 9px 0 currentColor, 12px 9px 0 currentColor,
                3px 12px 0 currentColor, 6px 12px 0 currentColor, 9px 12px 0 currentColor;
        }

        /* Icono de Usuario (Busto) */
        .icon-user {
            box-shadow: 
                6px 0px 0 currentColor, 9px 0px 0 currentColor,
                6px 3px 0 currentColor, 9px 3px 0 currentColor,
                3px 9px 0 currentColor, 6px 9px 0 currentColor, 9px 9px 0 currentColor, 12px 9px 0 currentColor,
                0px 12px 0 currentColor, 3px 12px 0 currentColor, 6px 12px 0 currentColor, 9px 12px 0 currentColor, 12px 12px 0 currentColor, 15px 12px 0 currentColor;
        }
    </style>
</head>
<body>

    <div id="app-root" class="pixel-border">
        
        <!-- BARRA LATERAL -->
        <aside class="app-sidebar pixel-border">
            <div class="brand">
                <i class="px-icon icon-logo"></i>
                <span>PIXEL.OS</span>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-view="dashboard">
                    <i class="px-icon icon-panel"></i>
                    <span>PANEL</span>
                </button>
                <button class="nav-item" data-view="analytics">
                    <i class="px-icon icon-metrics"></i>
                    <span>MÉTRICAS</span>
                </button>
                <button class="nav-item" data-view="settings">
                    <i class="px-icon icon-settings"></i>
                    <span>SISTEMA</span>
                </button>
            </nav>
        </aside>

        <!-- CONTENIDO DE LA APLICACIÓN -->
        <main class="app-content pixel-border">
            <header class="content-header">
                <h1 id="view-title">Cargando...</h1>
                <div class="user-profile pixel-border">
                    <i class="px-icon icon-user"></i>
                    <span>OPERATOR_01</span>
                </div>
            </header>

            <!-- CONTENEDOR DINÁMICO DONDE OCURRE LA MAGIA -->
            <section id="view-viewport" class="view-viewport">
                <!-- Se inyecta vía JS -->
            </section>
        </main>

    </div>

    <!-- LOGICA SÓLIDA DE ENRUTADO Y RENDERIZADO -->
    <script>
        // Base de datos local simulada interactiva
        const APP_DATABASE = {
            dashboard: {
                title: "PANEL DE CONTROL PRINCIPAL",
                render: () => `
                    <div class="grid-layout">
                        <div class="pixel-card pixel-border">
                            <h3>PROCESOS ACTIVOS</h3>
                            <div class="value">42 NO-ERR</div>
                        </div>
                        <div class="pixel-card pixel-border">
                            <h3>MEMORIA CORE</h3>
                            <div class="value" style="color: var(--accent-blue);">71.2 GB</div>
                        </div>
                        <div class="pixel-card pixel-border">
                            <h3>UPTIME</h3>
                            <div class="value" style="color: var(--accent-orange);">99.98%</div>
                        </div>
                    </div>
                    <div class="pixel-card pixel-border">
                        <h3>REGISTRO DE OPERACIONES EN TIEMPO REAL</h3>
                        <table class="pixel-table">
                            <thead>
                                <tr>
                                    <th>NODO</th>
                                    <th>ESTADO</th>
                                    <th>ESTABLE</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>CENTRAL_01</td>
                                    <td style="color: var(--accent-green);">ONLINE</td>
                                    <td>SÍ</td>
                                </tr>
                                <tr>
                                    <td>BACKUP_NODE</td>
                                    <td style="color: var(--accent-orange);">STANDBY</td>
                                    <td>SÍ</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                `
            },
            analytics: {
                title: "ANÁLISIS Y ESTADÍSTICAS",
                render: () => `
                    <div class="pixel-card pixel-border" style="margin-bottom: 16px;">
                        <h3>MÉTRICAS DE RENDIMIENTO GLOBAL</h3>
                        <p style="margin: 10px 0; color: var(--text-muted);">Los datos mostrados abajo reflejan los subprocesos ejecutados por segundo de manera síncrona.</p>
                        <table class="pixel-table">
                            <thead>
                                <tr>
                                    <th>ID REGISTRO</th>
                                    <th>TASA DE ÉXITO</th>
                                    <th>LATENCIA</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>#9012</td>
                                    <td>100%</td>
                                    <td>4ms</td>
                                </tr>
                                <tr>
                                    <td>#9011</td>
                                    <td>98.4%</td>
                                    <td>12ms</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                `
            },
            settings: {
                title: "CONFIGURACIÓN DEL ENTORNO",
                render: () => `
                    <div class="pixel-card pixel-border">
                        <h3>PARÁMETROS DEL CORE</h3>
                        <form class="pixel-form" onsubmit="event.preventDefault(); alert('Configuración guardada en LocalStorage de forma segura.');">
                            <div class="form-group">
                                <label>NOMBRE DEL SERVIDOR WEB</label>
                                <input type="text" class="pixel-input" value="PRODUCTION_MAIN_CORE">
                            </div>
                            <div class="form-group">
                                <label>PUERTO DE ESCUCHA</label>
                                <input type="number" class="pixel-input" value="8080">
                            </div>
                            <button type="submit" class="pixel-btn">ACTUALIZAR NODO</button>
                        </form>
                    </div>
                `
            }
        };

        // Controlador de la aplicación
        class SoftwareEngine {
            constructor() {
                this.buttons = document.querySelectorAll('.nav-item');
                this.titleElement = document.getElementById('view-title');
                this.viewport = document.getElementById('view-viewport');
                
                this.setupEvents();
                // Renderizar la primera pestaña por defecto de forma automática
                this.switchView('dashboard');
            }

            setupEvents() {
                this.buttons.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const viewTarget = e.currentTarget.getAttribute('data-view');
                        
                        // Quitar estado activo previo y asignar al nuevo
                        this.buttons.forEach(b => b.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        
                        this.switchView(viewTarget);
                    });
                });
            }

            switchView(viewKey) {
                const viewData = APP_DATABASE[viewKey];
                if (viewData) {
                    this.titleElement.textContent = viewData.title;
                    this.viewport.innerHTML = viewData.render();
                } else {
                    this.titleElement.textContent = "ERROR";
                    this.viewport.innerHTML = "<p>Módulo de software no encontrado.</p>";
                }
            }
        }

        // Arrancar el software inmediatamente cuando el DOM cargue
        document.addEventListener('DOMContentLoaded', () => {
            window.AppEngine = new SoftwareEngine();
        });
    </script>
</body>
</html>
